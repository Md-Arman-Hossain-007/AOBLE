
services:
  db:
    image: postgres:15-alpine
    container_name: amltab-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: amltab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # redis:
  #   image: redis:7-alpine
  #   container_name: amltab-redis
  #   restart: always
  #   ports:
  #     - "6379:6379"

  backend:
    build: ./backend
    container_name: amltab-backend
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_SERVER: db
      POSTGRES_DB: amltab
      REDIS_HOST: redis
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SECRET_KEY: amltab-secret-key-2024
      USE_SQLITE: "false"
      YENTE_URL: http://yente:8000
      YENTE_UPDATE_TOKEN: ${YENTE_UPDATE_TOKEN}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      SAML_IDP_METADATA_URL: ${SAML_IDP_METADATA_URL:-}
      SAML_ENTITY_ID: ${SAML_ENTITY_ID:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db
      # - redis
      - elasticsearch
      - yente

  yente:
    image: ghcr.io/opensanctions/yente:latest
    container_name: amltab-yente
    restart: always
    environment:
      - YENTE_MANIFEST=/app/data/manifest.yml
      - YENTE_INDEX_URL=http://elasticsearch:9200
      - YENTE_AUTO_REINDEX=true
      - YENTE_REINDEX_INTERVAL=3600
      - YENTE_UPDATE_TOKEN=${YENTE_UPDATE_TOKEN}
    volumes:
      - ./data:/app/data
    ports:
      - "8001:8000"
    # depends_on:
    #   - redis

  celery_worker:
    build: ./backend
    container_name: amltab-celery-worker
    command: celery -A app.core.celery_app worker --loglevel=info -Q celery,batch-queue,main-queue
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_SERVER: db
      POSTGRES_DB: amltab
      REDIS_HOST: redis
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SECRET_KEY: amltab-secret-key-2024
      USE_SQLITE: "false"
      YENTE_URL: http://yente:8000
      YENTE_UPDATE_TOKEN: ${YENTE_UPDATE_TOKEN}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      SAML_IDP_METADATA_URL: ${SAML_IDP_METADATA_URL:-}
      SAML_ENTITY_ID: ${SAML_ENTITY_ID:-}
    volumes:
      - ./data:/app/data
    depends_on:
      - db
      # - redis
      - elasticsearch
    restart: always

  celery_beat:
    build: ./backend
    container_name: amltab-celery-beat
    command: celery -A app.core.celery_app beat --loglevel=info
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_SERVER: db
      POSTGRES_DB: amltab
      REDIS_HOST: redis
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SECRET_KEY: amltab-secret-key-2024
      USE_SQLITE: "false"
      YENTE_URL: http://yente:8000
      YENTE_UPDATE_TOKEN: ${YENTE_UPDATE_TOKEN}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      SAML_IDP_METADATA_URL: ${SAML_IDP_METADATA_URL:-}
      SAML_ENTITY_ID: ${SAML_ENTITY_ID:-}
    volumes:
      - ./data:/app/data
    depends_on:
      - db
      # - redis
      - elasticsearch
    restart: always

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: amltab-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: always

  frontend:
    build: ./frontend
    container_name: amltab-frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - BACKEND_API_URL=http://backend:8000/api/v1
      - NODE_ENV=development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - backend

volumes:
  postgres_data:
  es_data:
