
services:
  db:
    image: postgres:15-alpine
    container_name: amltab-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-amltab}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: amltab-redis-prod
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: amltab-backend-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_SERVER: db
      POSTGRES_DB: ${POSTGRES_DB:-amltab}
      REDIS_HOST: redis
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SECRET_KEY: ${SECRET_KEY}
      USE_SQLITE: "false"
      YENTE_URL: http://yente:8000
      YENTE_UPDATE_TOKEN: ${YENTE_UPDATE_TOKEN}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      yente:
        condition: service_started

  yente:
    image: ghcr.io/opensanctions/yente:latest
    container_name: amltab-yente-prod
    restart: unless-stopped
    environment:
      - YENTE_MANIFEST=/app/data/manifest.yml
      - YENTE_INDEX_URL=http://elasticsearch:9200
      - YENTE_AUTO_REINDEX=true
      - YENTE_REINDEX_INTERVAL=3600
    volumes:
      - ./data:/app/data
    ports:
      - "8001:8000"

  celery_worker:
    build: ./backend
    container_name: amltab-celery-worker-prod
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=warning -Q celery,batch-queue,main-queue --concurrency=4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_SERVER: db
      POSTGRES_DB: ${POSTGRES_DB:-amltab}
      REDIS_HOST: redis
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build: ./backend
    container_name: amltab-celery-beat-prod
    restart: unless-stopped
    command: celery -A app.core.celery_app beat --loglevel=warning
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_SERVER: db
      POSTGRES_DB: ${POSTGRES_DB:-amltab}
      REDIS_HOST: redis
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: amltab-elasticsearch-prod
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - es_data_prod:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    container_name: amltab-frontend-prod
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data_prod:
  es_data_prod:
  redis_data_prod:
